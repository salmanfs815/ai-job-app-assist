## Note: persistence is optional. Set PERSISTENCE_ENABLED=true and provide Cosmos or DATABASE_URL to enable.
services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      PERSISTENCE_ENABLED: ${PERSISTENCE_ENABLED:-false}
      COSMOS_ENDPOINT: ${COSMOS_ENDPOINT:-}
      COSMOS_KEY: ${COSMOS_KEY:-}
      COSMOS_DATABASE_NAME: ${COSMOS_DATABASE_NAME:-jobassist}
      COSMOS_CONTAINER_NAME: ${COSMOS_CONTAINER_NAME:-results}
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
      VITE_MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-5242880}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
